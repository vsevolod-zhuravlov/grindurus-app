# docker-compose.dev.yml
# $ docker compose -f docker-compose.dev.yml up -d --build

version: "3.9"

name: grindurus-app-dev

networks:
  grindurus:
    external: true

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: app-dev
    restart: unless-stopped
    # node_modules volume replaces image deps; install linux binaries (esbuild, etc.) here
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3001"
    environment:
      - BOSS_API_TARGET=${BOSS_API_TARGET:-http://boss-backend-dev:8000}
    networks:
      - grindurus
    ports:
      - "3001:3001"
    volumes:
      - ./:/app
      - node_modules:/app/node_modules

volumes:
  node_modules:
