# docker-compose.yml
# $ docker compose up -d --build

version: "3.9"

name: grindurus-app

services:
  app:
    build:
      context: .
      dockerfile: dockerfile
    container_name: app
    restart: unless-stopped
    command: sh -c "npm run build && npm run preview -- --host 0.0.0.0 --port 3001"
    ports:
      - "3001:3001"
